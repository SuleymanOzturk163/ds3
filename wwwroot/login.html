            <button>
              <i class="fa-solid fa-magnifying-glass"></i>

      <div class="Giris">
        <span class="iconkapama">
          <i class="fa-solid fa-xmark"></i>
        </span>



        <div class="formkutu login">
          <h2>Giriş Yap</h2>
          <form action="#">
            <div class="giriskutu">
              <span class="icon"><i class="fa-solid fa-envelope"></i></span>
              <input type="email" required>
              <label>Gmail</label>
            </div>
            <div class="giriskutu">
              <span class="icon"><i class="fa-solid fa-lock"></i></span>
              <input type="password" required>
              <label>Şifre</label>
            </div>
            <div class="remember">
              <label><input type="checkbox">Remember me</label>
              <a href="#">Parolanızı mı unuttunuz?</a>
            </div>
            <button type="submit" class="buton">Giriş Yap</button>
            <div class="giris-kayit">
              <p>Hesabınız yok mu?<a href="#" class="kayit-link">kayıt ol</a></p>
            </div>
          </form>
        </div>


        <div class="formkutu register">
          <h2>Kayıt Ol</h2>
          <form action="#">
            <div class="giriskutu">
              <span class="icon"><i class="fa-solid fa-user"></i></span>
              <input type="text" required>
              <label>Kullanıcı Adı</label>
            </div>
            <div class="giriskutu">
              <span class="icon"><i class="fa-solid fa-envelope"></i></span>
              <input type="email" required>
              <label>Gmail</label>
            </div>
            <div class="giriskutu">
              <span class="icon"><i class="fa-solid fa-lock"></i></span>
              <input type="password" required>
              <label>Şifre</label>
            </div>
            <div class="remember">
              <label><input type="checkbox">Şartlar ve koşulları kabul ediyorum</label>
            </div>
            <button type="submit" class="buton">Kayıt Ol</button>
            <div class="giris-kayit">
              <p>Zaten bir hesabınız var mı?<a href="#" class="giris-link">Giriş Yap</a></p>
            </div>
          </form>
        </div>
      </div>
      <script src="js/account.js"></script>
      <script src="js/loader.js"></script>
  </body>
</html>
